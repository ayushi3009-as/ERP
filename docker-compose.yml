version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: microerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: microerp
      POSTGRES_USER: microerp
      POSTGRES_PASSWORD: microerp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microerp -d microerp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microerp-network

  redis:
    image: redis:7-alpine
    container_name: microerp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microerp-network

  minio:
    image: minio/minio:latest
    container_name: microerp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microerp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: microerp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://microerp:microerp@postgres:5432/microerp
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: microerp
      # No hardcoded fallback: found during the final security review that
      # this file previously baked in the same insecure default SECRET_KEY
      # main.py now refuses to boot with outside development/test. Compose
      # will refuse to start at all if SECRET_KEY isn't set in your shell
      # or a .env file next to this compose file -- that's intentional.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in your environment or a .env file -- see docs/MIGRATIONS.md-adjacent security notes}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: "true"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microerp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: microerp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - microerp-network

networks:
  microerp-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
